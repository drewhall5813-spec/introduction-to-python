# nginx config for Ashenmoor MUD web client
# ─────────────────────────────────────────
# No websockify needed.  Python handles WebSocket directly on :4001.
# nginx reverse-proxies /ws to it and serves the static client from /var/www/mud.
#
# Ports:
#   4000  raw telnet (MudServer)
#   4001  WebSocket  (WebSocketServer)
#   80    HTTP → nginx → static files + /ws proxy

server {
    listen 80;
    server_name your-domain.com;   # ← change this

    # ── Static web client ─────────────────────────────────────────────────────
    root  /var/www/mud;
    index mud-client.html;

    location / {
        try_files $uri $uri/ /mud-client.html;
    }

    # ── WebSocket proxy to Python server ──────────────────────────────────────
    # Browser connects:  ws://your-domain.com/ws
    # nginx forwards to: ws://127.0.0.1:4001
    location /ws {
        proxy_pass         http://127.0.0.1:4001;
        proxy_http_version 1.1;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout    3600s;
        proxy_send_timeout    3600s;
        proxy_connect_timeout 10s;
        proxy_buffering       off;
    }
}

